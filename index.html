<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 严格移动端缩放禁止放大缩小，适配屏幕 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>诚信经理人认证证书详情</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", SimSun, sans-serif;
        }
        body {
            background: #ffffff;
            padding: 20px 15px; /* 手机缩小内边距 */
            max-width: 700px;
            margin: 0 auto;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ddd;
            flex-wrap: wrap; /* 空间不足自动换行 */
            gap:10px;
        }
        .logo-text {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: bold;
        }
        .logo-circle {
            width: 24px;
            height: 24px;
            background: #c8102e;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
        }
        .header-right {
            font-size: 14px;
            color: #333;
        }
        .line-divider {
            height: 1px;
            background: #ddd;
            margin: 25px 0;
        }
        .company-title {
            text-align: center;
            font-size: 20px;
            color: #333;
            margin-bottom: 20px;
        }
        .cert-title {
            text-align: center;
            font-size: clamp(24px,6vw,32px); /* 自适应字体大小 */
            font-weight: normal;
            margin-bottom: 12px;
        }
        .preview-link {
            text-align: center;
            color: #4080dd;
            font-size: 18px;
            margin-bottom: 20px;
        }
        .num-line {
            width: 90%; /* 手机加宽占比，不用70%挤得窄 */
            margin: 0 auto 30px;
            text-align: center;
            font-size: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid #999;
        }
        .text-block {
            font-size: clamp(18px,5vw,24px);
            margin: 35px 0; /* 删掉原来固定130px左右边距，改用内部宽度控制 */
        }
        .txt-left {
            margin-bottom: 25px;
            padding-left: 5%;
        }
        .name-center {
            text-align: center;
            font-size: clamp(24px,7vw,30px);
            margin: 30px 0;
        }
        .content-txt {
            text-indent: 2em;
            width: 90%;
            margin: 0 auto 30px;
            line-height: 1.6;
        }
        /* 签名+二维码 移动端自适应布局 */
        .sign-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap; /* 手机自动上下换行 */
            gap: 30px;
            margin-top: 50px;
            padding-left: 0; /* 清除左侧大固定padding */
        }
        .qrcode-box {
            width: 140px;
            height: 140px;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sign-text {
            font-size: clamp(16px,4vw,20px);
            line-height: 2;
            text-align: center;
            flex: 1;
            min-width:220px;
        }
        .bottom-tip {
            text-align: center;
            margin-top: 40px;
            color: #4080dd;
            font-size: 16px;
        }
        .bottom-line {
            margin-top: 20px;
            height: 1px;
            background: #ddd;
        }
        /* 小屏幕手机额外微调 */
        @media (max-width:960px){
            .qrcode-box{
                width:120px;
                height:120px;
            }
            img[src*="cert-qr.png"]{
                width:116px;
                height:116px;
            }
        }
    </style>
</head>
<body>
    <div class="header-top">
         <img width="100" src="img/lyys_logo.webp">
        <div class="header-right">企业主体信用评级</div>
    </div>

    <div class="company-title">华夏中投（北京）国际信用评估有限公司</div>
    <h1 class="cert-title">诚信经理人认证证书</h1>
    <div class="preview-link"> <a href="CHXJLR.html" target="_blank">[预览证书]</a></div>

    <div class="num-line">编号：WCXT112972860532 华夏中投评字[2025]</div>

    <div class="text-block txt-left">经审定</div>

    <div class="name-center">李殿霞</div>

    <div class="text-block content-txt">
        李殿霞诚信经理人认证证书，有效期自二零二五年四月八日起至二零二八年四月七日止
    </div>

    <div class="text-block txt-left">特此公告</div>

    <div class="sign-wrap">
        <div class="qrcode-box">
            <img src="img/cert-qr.webp" width="136" height="136"> 
        </div>
        <div class="sign-text">
            <p>华夏中投（北京）国际信用评估有限公司</p>
            <p>二零二五年四月八日</p>
        </div>
    </div>

    <div class="bottom-tip">该单位还有11个相关证书</div>
    <div class="bottom-line"></div>
</body>
</html>
