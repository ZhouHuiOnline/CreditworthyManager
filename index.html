
<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<html>
<head>
    <script type="text/javascript">var rootPath = "http://new.anzhuo.net";</script>
    <style type="text/css">
        .connon {
            width: 600px;
            margin: 50px auto;
        }

        .ym {
            height: 40px;
            line-height: 40px;
            border-bottom: 1px solid #cccccc;
        }

        .ymlt {
            float: left;
        }

        .ymrt {
            float: right;
            font-size: 13px;
        }

        .ymzt h2 {
            height: 50px;
            line-height: 50px;
            font-weight: 100;
            margin-top: 35px;
            font-size: 22px;
            text-align: center;
        }

        .ymzt h3 {
            height: 50px;
            line-height: 40px;
            text-align: center;
            font-size: 30px;
            font-weight: 100;
            margin-bottom: 0;
        }

        .bh {
            width: 540px;
            font-size: 15px;
            text-align: center;
            height: 30px;
            line-height: 30px;
            border-bottom: 1px solid #aaaaaa;
            margin: auto;
        }

        .ymcon {
            width: 600px;
            margin: auto;
        }

        .ymcon p {
            font-size: 28px;
            margin-top: 20px;
            text-indent: 2em;
        }

        .yj {
            height: 60px;
            clear: both;
            line-height: 60px;
            border-bottom: 1px solid #cccccc;
        }

        p {
            font-family: "微软雅黑";
        }

        h3 {
            font-family: "微软雅黑";
        }

        h2 {
            font-family: "微软雅黑";
        }
    </style>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type">


    <title>华夏中投（北京）国际信用评估有限公司</title>
    <script src="static/js/jquery-1.9.1.min.js" type="text/javascript"></script>
    <script src="static/js/qrcode.min.js" type="text/javascript"></script>
    <link href="http://www.anzhuo.net/creditInfo/css.css" rel="stylesheet" type="text/css">
</head>
<body>
<div class="connon">
    <div class="ym">
        <div class="ymlt"><img width="100" src="static/image/lyys_logo.png"></div>
        <div class="ymrt">企业主体信用评级</div>
    </div>
    <div class="ymzt">
        <h2 id="guishu_str">华夏中投（北京）国际信用评估有限公司</h2>


        <h3 style="letter-spacing: 4px;" id="type_str">信 用 等 级 公 告 书</h3>


        <p style="text-align:center; font-size:20px; color:#428dd4; margin-top:0;" id="gaishuye_pic"><a id="tiaozhuan" style="text-decoration: none;color:#428dd4;" href="javascript:void(0)" >[预览证书]</a></p>


        <div class="bh">编号：<font id="no"></font> 华夏中投评字[<font id="year_Str">2023</font>]</div>
        <div class="ymcon">
            <p style="text-indent:2em; margin-top:50px;">经审定</p>
            <p style="text-align:center;"><font id="title"></font></p>
            <p>


                <font id="type_str1"></font>

                <font id="level"></font></p>
            <p style="text-indent:2em;">特此公告</p>
        </div>
        <div style="
            display: flex;
            justify-content: space-between;
            align-items: flex-end;"
        >
            <div class="ont" id="qrcode" style="display: block; height:128px; width:128px;float: left"></div>
            <div class="yt" style="float:right; width:400px;  text-align:center; font-size:20px;">
                <p id="luokuan">华夏中投（北京）国际信用评估有限公司</p>
                <p><font id="time_str"></font></p>
            </div>
        </div>
        <div style="display: flex;justify-content: center;margin-top: 30px"><a id="qitaxiangguan" target="_blank" style="text-decoration: none;color:#428dd4;" href="" ></a></div>
    </div>
    <div class="yj" style="height: 30px"></div>
</div>
<script type="text/javascript">
    $(function () {

        new QRCode('qrcode', {
            text: window.location.href,
            width: 128,
            height: 128,
            correctLevel : 3,
        })

        var Request = new Object();
        Request = GetRequest();
        var id;
        id = Request['id'];
        $.ajax({
            "type": "post",
            "url": rootPath + "/api/Hxhome/detail",
            "dataType": "json",
            "data": {"id": id},
            success: function (data) {
                $("#no").html(data.on_number);
                $("#title").html(data.name);

                $("#qitaxiangguan").html('该单位还有'+data.total+'个相关证书');
                $("#qitaxiangguan").attr('href','/newsPage-33.html?name='+data.name);
                $("#level").html(data.level);
                $("#luokuan").html(data.luokuan);
                $("#time_str").html(data.start);
                $("#year_Str").html(data.year_Str);
                // if (data.type_str == '资信'){
                //     $("#type_str").html('资 信 等 级 公 告 书');
                //     $("#type_str1").html('资信等级');
                // }else{
                //     $("#type_str").html('信 用 等 级 公 告 书');
                //     $("#type_str1").html('信用等级');
                // }
                $("#type_str").html(data.product_name);

                if (data.guishu == '华夏中投'){
                    $("#guishu_str").html('华夏中投（北京）国际信用评估有限公司');
                }else{
                    $("#guishu_str").html('华夏中投（北京）国际信用评估有限公司');
                }

                $('#tiaozhuan').attr('href','/dianzi.html?id='+data.id);
                $('#tiaozhuan').attr('target','_blank');



            }
        })
    })

    function GetRequest() {
        var url = location.search; //获取url中"?"符后的字串
        var theRequest = new Object();
        if (url.indexOf("?") != -1) {
            var str = url.substr(1);
            strs = str.split("&");
            for(var i = 0; i < strs.length; i ++) {
                theRequest[strs[i].split("=")[0]]=decodeURI(strs[i].split("=")[1]);
            }
        }
        return theRequest;
    }
</script>
</body>
</html>
</html>
