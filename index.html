<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诚信经理人认证证书详情</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", SimSun, sans-serif;
        }
        body {
            background: #ffffff;
            padding: 40px 30px;
            max-width: 700px;
            margin: 0 auto;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ddd;
        }
        .logo-text {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: bold;
        }
        .logo-circle {
            width: 24px;
            height: 24px;
            background: #c8102e;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
        }
        .header-right {
            font-size: 14px;
            color: #333;
        }
        .line-divider {
            height: 1px;
            background: #ddd;
            margin: 25px 0;
        }
        .company-title {
            text-align: center;
            font-size: 20px;
            color: #333;
            margin-bottom: 20px;
        }
        .cert-title {
            text-align: center;
            font-size: 32px;
            font-weight: normal;
            margin-bottom: 12px;
        }
        .preview-link {
            text-align: center;
            color: #4080dd;
            font-size: 18px;
            margin-bottom: 20px;
        }
        .num-line {
            width: 70%;
            margin: 0 auto 30px;
            text-align: center;
            font-size: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid #999;
        }
        .text-block {
            font-size: 24px;
            margin: 35px 130PX;
        }
        .txt-left {
            margin-bottom: 25px;
        }
        .name-center {
            text-align: center;
            font-size: 30px;
            margin: 30px 0;
        }
        .content-txt {
            text-indent: 2em;
            width: 80%;
            margin: 0 auto 30px;
            line-height: 1.6;
        }
        .sign-wrap {
            display: flex;
            align-items: flex-end;
            gap: 50px;
            margin-top: 50px;
            padding-left: 80px;
        }
        .qrcode-box {
            width: 140px;
            height: 140px;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sign-text {
            font-size: 20px;
            line-height: 2;
            text-align: center;
            flex: 1;
        }
        .bottom-tip {
            text-align: center;
            margin-top: 40px;
            color: #4080dd;
            font-size: 16px;
        }
        .bottom-line {
            margin-top: 20px;
            height: 1px;
            background: #ddd;
        }
    </style>
</head>
<body>
    <div class="header-top">
        <div class="logo-text">
            <span>
                <img width="100" src="CreditworthyManager/image/lyys_logo.png>
            </span>
            <span>华夏中投</span>
        </div>
        <div class="header-right">企业主体信用评级</div>
    </div>

    <div class="company-title">华夏中投（北京）国际信用评估有限公司</div>
    <h1 class="cert-title">诚信经理人认证证书</h1>
    <div class="preview-link">[预览证书]</div>

    <div class="num-line">编号：WCXT112972860532 华夏中投评字[2025]</div>

    <div class="text-block txt-left">经审定</div>

    <div class="name-center">李殿霞</div>

    <div class="text-block content-txt">
        李殿霞诚信经理人认证证书，有效期自二零二五年四月八日起至二零二八年四月七日止
    </div>

    <div class="text-block txt-left">特此公告</div>

    <div class="sign-wrap">
        <div class="qrcode-box">
            <!-- 这里可以替换成真实二维码图片 <img src="qrcode.png" width="136" height="136"> -->
            二维码区域
        </div>
        <div class="sign-text">
            <p>华夏中投（北京）国际信用评估有限公司</p>
            <p>二零二五年四月八日</p>
        </div>
    </div>

    <div class="bottom-tip">该单位还有11个相关证书</div>
    <div class="bottom-line"></div>
</body>
</html>
