<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>诚信经理人认证证书详情</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", SimSun, sans-serif;
        }
        body {
            background: #ffffff;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        /* 缩放父容器 手机限制高度为屏幕50%，内部整体等比缩放 */
        .scale-box {
            max-width: 100%;
            max-height: 50vh;
            display: flex;
            justify-content: center;
        }
        /* 证书本体盒子，固定最大宽度，内部内容完整不压缩变形 */
        .cert-container {
            width: 700px;
            max-width: 100%;
            transform-origin: top center;
        }
        /* 桌面端取消缩放限制 */
        @media (min-width:768px) {
            .scale-box {
                max-height: unset;
            }
            .cert-container {
                transform: none !important;
            }
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ddd;
            flex-wrap: wrap;
            gap:10px;
        }
        .header-right {
            font-size: 14px;
            color: #333;
        }
        .company-title {
            text-align: center;
            font-size: 20px;
            color: #333;
            margin-bottom: 20px;
        }
        .cert-title {
            text-align: center;
            font-size: 32px;
            font-weight: normal;
            margin-bottom: 12px;
        }
        .preview-link {
            text-align: center;
            color: #4080dd;
            font-size: 18px;
            margin-bottom: 20px;
        }
        .num-line {
            width: 90%;
            margin: 0 auto 30px;
            text-align: center;
            font-size: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid #999;
        }
        .text-block {
            font-size: 24px;
            margin: 35px 0;
        }
        .txt-left {
            margin-bottom: 25px;
            padding-left: 5%;
        }
        .name-center {
            text-align: center;
            font-size: 30px;
            margin: 30px 0;
        }
        .content-txt {
            text-indent: 2em;
            width: 90%;
            margin: 0 auto 30px;
            line-height: 1.6;
        }
        .sign-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 30px;
            margin-top: 50px;
            padding-left: 0;
        }
        .qrcode-box {
            width: 140px;
            height: 140px;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sign-text {
            font-size: 20px;
            line-height: 2;
            text-align: center;
            flex: 1;
            min-width:220px;
        }
        .bottom-tip {
            text-align: center;
            margin-top: 40px;
            color: #4080dd;
            font-size: 16px;
        }
        .bottom-line {
            margin-top: 20px;
            height: 1px;
            background: #ddd;
        }
        /* 手机自动计算缩放比例，完整塞进50vh高度 */
        @media (max-width:767px){
            .cert-container{
                /* 自动计算缩放倍数，完整内容装进上半屏 */
                transform: scale(calc(50vh / var(--cert-full-height)));
            }
            /* 给证书标记完整高度基准 */
            .cert-container{
                --cert-full-height: 1300px; /* 这个数值是证书完整高度，实测适配 */
            }
        }
        /* 小尺寸二维码微调 */
        @media (max-width:480px){
            .qrcode-box{
                width:120px;
                height:120px;
            }
            img[src*="cert-qr.png"]{
                width:116px;
                height:116px;
            }
        }
    </style>
</head>
<body>
    <!-- 双层包裹：缩放层+证书本体 -->
    <div class="scale-box">
        <div class="cert-container">
            <div class="header-top">
                 <img width="100" src="images/lyys_logo.png">
                <div class="header-right">企业主体信用评级</div>
            </div>

            <div class="company-title">华夏中投（北京）国际信用评估有限公司</div>
            <h1 class="cert-title">诚信经理人认证证书</h1>
            <div class="preview-link">[预览证书]</div>

            <div class="num-line">编号：WCXT112972860532 华夏中投评字[2025]</div>

            <div class="text-block txt-left">经审定</div>

            <div class="name-center">李殿霞</div>

            <div class="text-block content-txt">
                李殿霞诚信经理人认证证书，有效期自二零二五年四月八日起至二零二八年四月七日止
            </div>

            <div class="text-block txt-left">特此公告</div>

            <div class="sign-wrap">
                <div class="qrcode-box">
                    <img src="images/cert-qr.png" width="136" height="136"> 
                </div>
                <div class="sign-text">
                    <p>华夏中投（北京）国际信用评估有限公司</p>
                    <p>二零二五年四月八日</p>
                </div>
            </div>

            <div class="bottom-tip">该单位还有11个相关证书</div>
            <div class="bottom-line"></div>
        </div>
    </div>
</body>
</html>
