<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诚信经理人认证证书详情</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", SimSun, serif;
        }
        body {
            background-color: #f5f5f5;
            padding: 30px 0;
        }
        .cert-container {
            width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 50px 60px;
            border: 1px solid #ddd;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo img {
            width: 180px;
            height: auto;
        }
        .cert-title {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 25px;
            color: #333;
        }
        .cert-no {
            text-align: right;
            font-size: 16px;
            color: #444;
            margin-bottom: 40px;
        }
        .cert-content {
            font-size: 18px;
            line-height: 2.2;
            text-indent: 2em;
            color: #333;
            margin-bottom: 50px;
        }
        .cert-qr {
            text-align: center;
            margin: 40px 0;
        }
        .cert-qr img {
            width: 120px;
            height: 120px;
        }
        .cert-date {
            text-align: right;
            font-size: 16px;
            line-height: 2;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="cert-container">
        <!-- 头部Logo -->
        <div class="logo">
            <img src="images/huaxia-logo.png.png" alt="华夏中投LOGO">
        </div>

        <!-- 证书标题 -->
        <h1 class="cert-title">诚信经理人认证证书</h1>

        <!-- 证书编号 -->
        <div class="cert-no">
            编号：WCXT112972860532 华夏中投评字[2025]
        </div>

        <!-- 证书正文 -->
        <div class="cert-content">
            经审定<br>
            王锦程<br>
            王锦程诚信经理人认证证书，有效期自二零二五年四月八日起至二零二八年四月七日止<br>
            特此公告
        </div>

        <!-- 二维码区域 -->
        <div class="cert-qr">
            <img src="images/cert-qr.png" alt="证书二维码">
        </div>

        <!-- 落款与日期 -->
        <div class="cert-date">
            华夏中投（北京）国际信用评估有限公司<br>
            二零二五年四月八日
        </div>
    </div>
</body>
</html>
