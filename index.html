<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诚信经理人认证证书</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", SimSun, sans-serif;
        }
        body {
            background-color: #ffffff;
            padding: 40px 20px;
        }
        .wrap {
            max-width: 800px;
            margin: 0 auto;
        }
        /* 顶部logo行 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 6px;
            border-bottom: 1px solid #dddddd;
            margin-bottom: 30px;
        }
        .logo-text {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 16px;
            color: #222;
        }
        .logo-circle {
            width: 24px;
            height: 24px;
            background-color: #d92121;
            border-radius: 50%;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .top-tag {
            font-size: 12px;
            color: #333;
        }
        /* 颁发机构名称 */
        .org-top-name {
            text-align: center;
            font-size: 17px;
            color: #333;
            margin-bottom: 22px;
        }
        /* 证书大标题 */
        .cert-title {
            text-align: center;
            font-size: 26px;
            color: #222;
            margin-bottom: 8px;
        }
        /* 预览蓝色小字 */
        .preview {
            text-align: center;
            font-size: 16px;
            color: #2385bb;
            text-decoration: underline;
            margin-bottom: 16px;
        }
        /* 编号分割线 */
        .no-line {
            width: 80%;
            margin: 0 auto 35px;
            border-bottom: 1px solid #ddd;
            text-align: center;
            font-size: 13px;
            color: #333;
            padding-bottom: 5px;
        }
        /* 正文区域 */
        .content {
            text-align: center;
            font-size: 20px;
            line-height: 2.1;
            color: #111;
        }
        .name {
            font-size: 23px;
            margin: 10px 0;
        }
        /* 底部二维码+落款 */
        .bottom-area {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 70px;
            margin: 30px 0;
        }
        /* 二维码空白占位框，不填充图片 */
        .qr-code {
            width: 120px;
            height: 120px;
            border:1px solid #999;
        }
        .sign-info {
            text-align: center;
            font-size: 19px;
            line-height: 2;
        }
        /* 底部提示文字 */
        .bottom-tip {
            width: 80%;
            margin: 0 auto;
            border-top: 1px solid #ddd;
            text-align: center;
            padding-top: 8px;
            font-size: 13px;
            color: #2385bb;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <!-- 顶部logo与标签 -->
        <div class="top-bar">
            <div class="logo-text">
                <div class="logo-circle">C</div>
                <span>华夏中投</span>
            </div>
            <span class="top-tag">企业主体信用评级</span>
        </div>

        <!-- 上方机构名称 -->
        <div class="org-top-name">华夏中投（北京）国际信用评估有限公司</div>

        <!-- 证书标题 -->
        <div class="cert-title">诚信经理人认证证书</div>

        <div class="preview">[预览证书]</div>

        <!-- 证书编号 -->
        <div class="no-line">编号：WCXT112972860532 华夏中投评字[2025]</div>

        <!-- 证书正文内容 -->
        <div class="content">
            经审定
            <div class="name">李殿霞</div>
            李殿霞诚信经理人认证证书，有效期自二零二五年四月八日起至二零二八年四月七日止
            <br>特此公告
        </div>

        <!-- 空白二维码框，无图片 -->
        <div class="bottom-area">
            <div class="qr-code"></div>
            <div class="sign-info">
                华夏中投（北京）国际信用评估有限公司<br>
                二零二五年四月八日
            </div>
        </div>

        <!-- 底部提示文字 -->
        <div class="bottom-tip">该单位还有11个相关证书</div>
    </div>
</body>
</html>
